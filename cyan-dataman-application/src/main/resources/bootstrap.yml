# 基础应用配置
spring:
  profiles:
    active: dev
  application:
    name:  cyan-dataman
  main:
    web-application-type: servlet
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
# 服务监控端点（暴露所有端点，生产环境需调整）
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

# StarRocks 数据库连接配置
starrocks:
  url: jdbc:mysql://10.0.0.2:32132/?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
  username: root
  password: 123456

