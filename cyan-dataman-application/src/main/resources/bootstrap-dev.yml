spring:
  config:
    import:
      - "nacos:arch-base.yaml?group=DEFAULT_GROUP&namespace=dev"
      - "nacos:cyan-dataman.yaml?group=DEFAULT_GROUP&namespace=dev"
  cloud:
    nacos:
      # 通用配置（配置中心和注册中心可共享）
      server-addr: 10.0.0.2:8848  # Nacos服务器地址
      username: nacos  # Nacos登录账号
      password: nacos  # Nacos登录密码
      # 配置中心专项配置
      config:
        file-extension: yaml
        namespace: dev
      # 注册中心专项配置
      discovery:
        ephemeral: true
        namespace: dev
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
    url: jdbc:mysql://10.0.0.2:3306/cyan_dataman


# Gravitino 配置
gravitino:
  server:
    url: http://gravitino.cyan.com  # Gravitino 服务地址
  catalog:
    name: iceberg       # 要创建/使用的catalog名称
    type: ICEBERG               # catalog类型
    comment: "Iceberg catalog managed by Gravitino"

rustfs:
  endpoint: http://10.0.0.2:9000
  accessKey: rustfsadmin
  secretKey: rustfsadmin

iceberg:
  uri: http://iceberg-rest.cyan.com/iceberg

# Debezium 连接地址
debezium:
  url: http://10.0.0.2:28083

# Kafka 地址
kafka:
  url: 10.0.0.2:29092

# Flink 配置
flink:
  mode: local
  rest:
    url: 10.0.0.2:20031
  checkpoint:
    interval: 60000
    timeout: 600000
    dir: s3://flink/checkpoints/cyan-dataman