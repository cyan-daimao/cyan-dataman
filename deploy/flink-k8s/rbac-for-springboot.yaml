# ============================================================
# Spring Boot 操作 FlinkDeployment 所需的 RBAC
# Spring Boot 通过 Fabric8 K8s Client 在 flink namespace 中
# 创建/更新/删除 FlinkDeployment CR 和 ConfigMap
# ============================================================
# 说明：
# - ClusterRole / ClusterRoleBinding 是集群级别的，不需要 -n flink
# - subjects 中的 namespace 是 Spring Boot 所在的 namespace（pre / prod）
# - 如果 Spring Boot 使用非 default 的 ServiceAccount，请修改 name 字段

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: flink-deployment-manager
rules:
  # FlinkDeployment CR 权限（操作在 flink namespace 中）
  - apiGroups: ["flink.apache.org"]
    resources: ["flinkdeployments"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  # ConfigMap 权限（在 flink namespace 挂载 SQL 脚本）
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  # 查看 Pod 状态（用于 refreshSyncStatus）
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cyan-dataman-flink-deployment-manager
subjects:
  # pre 环境
  - kind: ServiceAccount
    name: default
    namespace: pre
  # prod 环境
  - kind: ServiceAccount
    name: default
    namespace: prod
roleRef:
  kind: ClusterRole
  name: flink-deployment-manager
  apiGroup: rbac.authorization.k8s.io
