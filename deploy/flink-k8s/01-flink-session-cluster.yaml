# ============================================================
# Flink Session Cluster on K8s
# 用途：运行 Flink SQL CDC 作业，将 Debezium Kafka 数据写入 Iceberg ODS
# 部署命令：kubectl apply -f 01-flink-session-cluster.yaml -n cyan-dataman
# ============================================================

apiVersion: v1
kind: Namespace
metadata:
  name: flink
---
# -------------------- Flink ConfigMap --------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: flink-config
  namespace: cyan-dataman
data:
  flink-conf.yaml: |
    jobmanager.memory.process.size: 2048m
    taskmanager.memory.process.size: 4096m
    taskmanager.numberOfTaskSlots: 4
    parallelism.default: 4
    state.backend: rocksdb
    state.checkpoints.dir: s3://flink/checkpoints/cyan-dataman
    state.savepoints.dir: s3://flink/savepoints/cyan-dataman
    execution.checkpointing.interval: 60s
    execution.checkpointing.timeout: 600s
    execution.checkpointing.max-concurrent-checkpoints: 1
    execution.checkpointing.min-pause: 500ms
    execution.checkpointing.mode: EXACTLY_ONCE
    # S3 文件系统（RustFS）
    s3.endpoint: http://rustfs.cyan.svc.cluster.local:9000
    s3.access-key: rustfsadmin
    s3.secret-key: rustfsadmin
    s3.path.style.access: true
---
# -------------------- Flink JobManager --------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-jobmanager
  namespace: cyan-dataman
  labels:
    app: flink
    component: jobmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flink
      component: jobmanager
  template:
    metadata:
      labels:
        app: flink
        component: jobmanager
    spec:
      containers:
        - name: jobmanager
          image: flink:2.0.1-scala_2.12
          args: ["jobmanager"]
          ports:
            - containerPort: 6123
              name: rpc
            - containerPort: 6124
              name: blob-server
            - containerPort: 8081
              name: webui
          env:
            - name: JOB_MANAGER_RPC_ADDRESS
              value: flink-jobmanager
          volumeMounts:
            - name: flink-config
              mountPath: /opt/flink/conf/flink-conf.yaml
              subPath: flink-conf.yaml
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "2Gi"
              cpu: "2"
      volumes:
        - name: flink-config
          configMap:
            name: flink-config
---
apiVersion: v1
kind: Service
metadata:
  name: flink-jobmanager
  namespace: cyan-dataman
spec:
  type: ClusterIP
  selector:
    app: flink
    component: jobmanager
  ports:
    - port: 6123
      targetPort: 6123
      name: rpc
    - port: 8081
      targetPort: 8081
      name: webui
---
# -------------------- Flink TaskManager --------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-taskmanager
  namespace: cyan-dataman
  labels:
    app: flink
    component: taskmanager
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flink
      component: taskmanager
  template:
    metadata:
      labels:
        app: flink
        component: taskmanager
    spec:
      containers:
        - name: taskmanager
          image: flink:2.0.1-scala_2.12
          args: ["taskmanager"]
          ports:
            - containerPort: 6122
              name: rpc
          env:
            - name: JOB_MANAGER_RPC_ADDRESS
              value: flink-jobmanager
          volumeMounts:
            - name: flink-config
              mountPath: /opt/flink/conf/flink-conf.yaml
              subPath: flink-conf.yaml
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
            limits:
              memory: "4Gi"
              cpu: "4"
      volumes:
        - name: flink-config
          configMap:
            name: flink-config
---
# -------------------- HPA（TaskManager 弹性扩容） --------------------
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: flink-taskmanager-hpa
  namespace: cyan-dataman
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: flink-taskmanager
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
